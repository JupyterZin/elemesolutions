<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9B4A"/>
      <stop offset="100%" stop-color="#D96A15"/>
    </linearGradient>
  </defs>

  <g transform="translate(8, 16)">
    <!-- L — Bold with curved cutout (orange) -->
    <rect x="8" y="8" width="30" height="88" fill="url(#fg)"/>
    <!-- L top serif -->
    <rect x="2" y="8" width="12" height="4" fill="url(#fg)"/>
    <rect x="38" y="8" width="6" height="4" fill="url(#fg)"/>
    <!-- L foot -->
    <rect x="8" y="92" width="72" height="4" fill="url(#fg)"/>
    <rect x="2" y="88" width="10" height="8" fill="url(#fg)"/>
    <!-- Curved cutout shape -->
    <path d="M 38 42 Q 38 90, 76 96 L 38 96 Z" fill="url(#fg)" opacity="0.9"/>

    <!-- M — Thin (blue) -->
    <rect x="80" y="8" width="2.5" height="88" fill="#2563EB"/>
    <rect x="74" y="8" width="12" height="3.5" fill="#2563EB"/>
    <rect x="74" y="92" width="12" height="3.5" fill="#2563EB"/>

    <polygon points="82.5,11 85,11 102,88 99.5,88" fill="#2563EB"/>
    <polygon points="99.5,88 102,88 119,11 116.5,11" fill="#2563EB"/>

    <rect x="116.5" y="8" width="2.5" height="88" fill="#2563EB"/>
    <rect x="113" y="8" width="12" height="3.5" fill="#2563EB"/>
    <rect x="113" y="92" width="12" height="3.5" fill="#2563EB"/>
  </g>
</svg>
